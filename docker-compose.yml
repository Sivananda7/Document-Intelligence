version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: doc_intel_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: doc_intel_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      # Override the local host mongodb URI with the docker-compose internal DNS name
      - MONGODB_URL=mongodb://mongodb:27017
    depends_on:
      - mongodb
    volumes:
      # Mount the local directory to support hot-reloading (requires uvicorn --reload if dev)
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: doc_intel_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000/api/v1
    depends_on:
      - backend
    volumes:
      # Mount local files for hot-reloading but keep node_modules internal
      - ./frontend:/app
      - /app/node_modules
    restart: unless-stopped

volumes:
  mongo_data:
